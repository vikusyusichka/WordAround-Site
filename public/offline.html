<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F6F6FB" />
    <title>WordAround — offline</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f6f6fb;
        color: #12206b;
        font-family: Manrope, system-ui, -apple-system, "Segoe UI", sans-serif;
        text-align: center;
      }
      .card {
        max-width: 30rem;
        background: #fff;
        border-radius: 24px;
        padding: 32px 28px;
        box-shadow: 0 6px 20px rgb(0 0 0 / 6%);
      }
      .badge {
        width: 56px; height: 56px; margin: 0 auto 16px;
        display: grid; place-items: center;
        border-radius: 50%; background: rgb(43 92 250 / 10%);
        font-size: 26px;
      }
      h1 { margin: 0 0 8px; font-size: 21px; font-weight: 800; }
      p { margin: 0 0 20px; font-size: 15px; line-height: 1.5; color: #5a6183; }
      button {
        height: 48px; width: 100%;
        border: 0; border-radius: 16px;
        background: linear-gradient(90deg, #2b5cfa, #4b7bff);
        color: #fff; font: inherit; font-size: 15px; font-weight: 600;
        cursor: pointer;
      }
      button:active { transform: scale(0.98); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge" aria-hidden="true">📡</div>
      <h1>You’re offline</h1>
      <p>
        WordAround needs a connection to load your sets and to use speaking,
        reading and listening practice. Reconnect and try again.
      </p>
      <button type="button" onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
